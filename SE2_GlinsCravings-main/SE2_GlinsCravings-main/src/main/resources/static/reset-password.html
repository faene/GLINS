<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Step 2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="split-window">
        <div class="panel-form">
            <div class="form-box">
                <p style="font-weight: 800; align-self: flex-start; margin-bottom: 10px;">Create New Password</p>
                
                <p style="align-self: flex-start; font-size: 14px;">New Password</p>
                <div class="input-capsule">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="rp-password" placeholder="At least 4 characters">
                </div>

                <p style="align-self: flex-start; font-size: 14px; margin-top: 5px;">Confirm Password</p>
                <div class="input-capsule">
                    <i class="fa-solid fa-check-double"></i>
                    <input type="password" id="rp-confirm" placeholder="Re-enter password">
                </div>

                <p id="rp-error" style="color:#dc3545; font-size:12px; display:none;"></p>

                <div style="display: flex; gap: 15px; width: 100%; margin-top: 15px;">
                    <button class="action-btn" style="flex: 1; background-color: #EABFB9;" onclick="location.href='forgot-password.html'">Back</button>
                    <button class="action-btn" style="flex: 1;" id="rp-reset">Reset</button>
                </div>
            </div>
        </div>

        <div class="panel-info">
            <img src="logo.png" alt="Logo" style="width: 120px; margin-bottom: 20px;">
            <h1 style="font-size: 40px; font-weight: 800;">Hello, Glins<br>Craver!</h1>
        </div>
    </div>

    <script>
        document.getElementById('rp-reset').addEventListener('click', async function() {
            const password = document.getElementById('rp-password').value;
            const confirm = document.getElementById('rp-confirm').value;
            const errorEl = document.getElementById('rp-error');
            const username = sessionStorage.getItem('resetUser');

            if (!username) {
                errorEl.textContent = 'Session expired. Please start again.';
                errorEl.style.display = 'block';
                return;
            }
            if (!password || password.length < 4) {
                errorEl.textContent = 'Password must be at least 4 characters.';
                errorEl.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.removeItem('resetUser');
                    alert('Password successfully reset!');
                    window.location.href = 'login.html';
                } else {
                    errorEl.textContent = data.message || 'Reset failed.';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = 'Connection error. Is the backend running?';
                errorEl.style.display = 'block';
            }
        });
    </script>

</body>
</html>
