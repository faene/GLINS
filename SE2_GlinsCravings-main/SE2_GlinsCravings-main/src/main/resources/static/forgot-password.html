<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Step 1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="split-window">
        <div class="panel-form">
            <div class="form-box">
                <p style="font-weight: 800; align-self: flex-start; margin-bottom: 10px;">Kindly provide the following:</p>
                
                <p style="align-self: flex-start; font-size: 14px;">Username</p>
                <div class="input-capsule">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fp-username" placeholder="Enter your username">
                </div>

                <p id="fp-error" style="color:#dc3545; font-size:12px; display:none;"></p>

                <div style="display: flex; gap: 15px; width: 100%; margin-top: 15px;">
                    <button class="action-btn" style="flex: 1; background-color: #EABFB9;" onclick="location.href='login.html'">Cancel</button>
                    <button class="action-btn" style="flex: 1;" id="fp-confirm">Confirm</button>
                </div>
            </div>
        </div>

        <div class="panel-info">
            <img src="logo.png" alt="Logo" style="width: 120px; margin-bottom: 20px;">
            <h1 style="font-size: 40px; font-weight: 800;">Hello, Glins<br>Craver!</h1>
        </div>
    </div>

    <script>
        document.getElementById('fp-confirm').addEventListener('click', async function() {
            const username = document.getElementById('fp-username').value.trim();
            const errorEl = document.getElementById('fp-error');
            if (!username) {
                errorEl.textContent = 'Please enter your username.';
                errorEl.style.display = 'block';
                return;
            }
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('resetUser', username);
                    window.location.href = 'reset-password.html';
                } else {
                    errorEl.textContent = data.message || 'Username not found.';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = 'Connection error. Is the backend running?';
                errorEl.style.display = 'block';
            }
        });
    </script>

</body>
</html>
