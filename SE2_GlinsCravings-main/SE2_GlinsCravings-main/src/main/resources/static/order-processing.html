<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS Admin - Glins Cravings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Maintain your exact dimensions */
        .dashboard-container {
            width: 1100px;
            height: 650px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            justify-content: space-between;
        }

        .pos-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
            padding: 15px;
            flex: 1;
            min-height: 0;
        }

        .menu-container, .billing-panel {
            background: white;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scroll-grid {
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }

        #order-list {
            flex: 1; 
            overflow-y: auto;
            margin: 10px 0;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }

        .checkout-section {
            border-top: 2px solid #000;
            padding-top: 10px;
            flex-shrink: 0;
        }

        .product-card {
            background: #fff;
            border: 1px solid #000;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 3px 3px 0px #EABFB9;
        }

        .product-card:hover { background: #fce4ec; transform: scale(1.02); }
        .product-card:active { transform: scale(0.95); background-color: #B86B77; color: white; }

        .back-btn {
            background: #000;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .cart-row {
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:5px 0; 
            border-bottom:1px dashed #eee; 
            font-size:12px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="dash-header">
            <img src="logo.png" alt="Logo" class="dash-logo">
            <h1 class="dash-title">Admin Order Processing</h1>
        </div>

        <div class="nav-controls">
            <a href="admin-dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> BACK TO DASHBOARD
            </a>
            <a href="queue-display.html" class="back-btn" style="background: #B86B77;">
                <i class="fa-solid fa-tv"></i> VIEW LIVE QUEUE
            </a>
        </div>

        <div class="pos-wrapper">
            <div class="menu-container">
                <h3 style="margin:0 0 10px 0;">Menu Selection</h3>
                <div class="scroll-grid" id="menuGrid">
                    <p style="text-align:center; color:#999; grid-column:span 2;">Loading menu...</p>
                </div>
            </div>

            <div class="billing-panel">
                <div style="background:#fdf2f2; padding:8px; border-radius:10px; border:1px solid #B86B77;">
                    <label style="font-size:10px; font-weight:800;">CUSTOMER NAME</label>
                    <input type="text" id="custName" placeholder="Guest" style="width:90%; padding:5px; border:1px solid #ccc; border-radius:5px; font-weight:700;">
                </div>

                <div id="order-list">
                    <p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">- No Items -</p>
                </div>

                <div class="checkout-section">
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900; color:#B86B77;">
                        <span>TOTAL</span>
                        <span id="total-val">₱0.00</span>
                    </div>
                    
                    <div class="button-group">
                        <button class="action-btn" style="flex: 2; height:45px; background:#28a745; color:white; border:2px solid #000; border-radius:12px; cursor:pointer; font-weight:800;" onclick="completeSale()">
                            COMPLETE SALE
                        </button>
                        <button class="action-btn" style="flex: 1; height:45px; background:#666; color:white; border:2px solid #000; border-radius:12px; cursor:pointer; font-size:11px;" onclick="clearAll()">
                            CLEAR ALL
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        requireLogin();

        let total = 0;
        let cartItems = [];

        async function loadMenu() {
            try {
                const products = await getInventory();
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';
                if (!products || products.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#999; grid-column:span 2;">No products available</p>';
                    return;
                }
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `${p.name}<br>₱${parseFloat(p.price).toFixed(2)}`;
                    card.onclick = () => addToCart(p.name, parseFloat(p.price));
                    grid.appendChild(card);
                });
            } catch (e) {
                document.getElementById('menuGrid').innerHTML = '<p style="text-align:center; color:#999; grid-column:span 2;">Could not load menu</p>';
            }
        }

        function addToCart(name, price) {
            // Check if item already exists to increment quantity
            const existingItem = cartItems.find(item => item.name === name);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cartItems.push({ name, price, qty: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            total = 0;

            if (cartItems.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">- No Items -</p>';
                document.getElementById('total-val').innerText = '₱0.00';
                return;
            }

            cartItems.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <span>${item.qty}x ${item.name}</span>
                    <div>
                        <span style="margin-right:8px;">₱${itemTotal.toFixed(2)}</span>
                        <i class="fa-solid fa-circle-xmark" style="color:#ff4d4d; cursor:pointer;" onclick="removeItem(${index})"></i>
                    </div>
                `;
                list.appendChild(row);
                total += itemTotal;
            });

            document.getElementById('total-val').innerText = `₱${total.toFixed(2)}`;
        }

        function removeItem(index) {
            cartItems.splice(index, 1);
            renderCart();
        }

        function clearAll() {
            if(cartItems.length > 0 && confirm("Clear entire order?")) {
                cartItems = [];
                renderCart();
            }
        }

        document.addEventListener('DOMContentLoaded', loadMenu);

        async function completeSale() {
            const name = document.getElementById('custName').value.trim();
            
            if(cartItems.length === 0) {
                return showToast('Add items first!', 'error');
            }

            // Prepare data for script.js addOrder function
            const orderData = {
                customer: name || 'Guest',
                items: cartItems // Contains name, qty, price
            };

            const res = await addOrder(orderData);

            if (res.success) {
                showToast('Order saved successfully!', 'success');
                // Reset fields
                cartItems = [];
                document.getElementById('custName').value = '';
                renderCart();
            } else {
                showToast(res.message || 'Order failed.', 'error');
            }
        }
    </script>
</body>
</html>
