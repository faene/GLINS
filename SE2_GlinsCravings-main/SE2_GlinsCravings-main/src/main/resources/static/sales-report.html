<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Report - Glins Cravings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container" style="width: 1100px; height: auto; min-height: 700px;">
        <div class="dash-header">
            <img src="logo.png" alt="Logo" class="dash-logo">
            <h1 class="dash-title">Sales Analytics</h1>
        </div>

        <div style="padding: 20px;">
            <button class="action-btn" style="width: 100px; margin-bottom: 20px;" onclick="location.href='admin-dashboard.html'">
                <i class="fa-solid fa-chevron-left"></i> Back
            </button>

            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <div style="flex: 1; background: white; padding: 15px; border: 2px solid #000; border-radius: 15px; text-align: center;">
                    <p style="font-size: 14px; color: #666;">Total Sales</p>
                    <h2 id="totalSales" style="font-size: 28px; color: #B86B77;">₱0.00</h2>
                </div>
                <div style="flex: 1; background: white; padding: 15px; border: 2px solid #000; border-radius: 15px; text-align: center;">
                    <p style="font-size: 14px; color: #666;">Orders Processed</p>
                    <h2 id="ordersCount" style="font-size: 28px;">0</h2>
                </div>
                <div style="flex: 1; background: white; padding: 15px; border: 2px solid #000; border-radius: 15px;">
                    <label style="font-weight: 800; font-size: 12px;">From:</label>
                    <input type="date" id="report-start" style="width: 100%; padding: 5px; margin-top: 2px; border: 1px solid #000; border-radius: 5px;">
                    <label style="font-weight: 800; font-size: 12px; margin-top: 5px; display: block;">To:</label>
                    <input type="date" id="report-end" style="width: 100%; padding: 5px; margin-top: 2px; border: 1px solid #000; border-radius: 5px;">
                </div>
                <button id="generate-report-btn" class="action-btn" style="background-color: #B86B77; color: white; align-self: center;" onclick="loadReport()">Generate Report</button>
            </div>

            <div class="table-controls" style="margin-bottom: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <p style="font-weight: 800;">Top Seller: <span id="topSeller" style="color: #B86B77;">N/A</span></p>
                </div>
                <button class="action-btn" style="background-color: #28a745; color: white; border: 1px solid #000;">
                    <i class="fa-solid fa-file-pdf"></i> Generate PDF
                </button>
            </div>

            <div class="table-wrapper" style="max-height: 450px;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Items Purchased</th>
                            <th>Total Qty</th>
                            <th>Total Amount</th>
                            <th>Date/Time</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="logout-footer">
            <p class="copyright">Copyrights 2026 @ Glins Cravings</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check if user is authorized via the state manager
        requireLogin();

        async function loadReport() {
            const startInput = document.getElementById('report-start');
            const endInput = document.getElementById('report-end');
            const tbody = document.getElementById('ordersBody');

            // Default to today if no dates selected
            const today = new Date().toISOString().split('T')[0];
            const startDate = startInput.value || today;
            const endDate = endInput.value || today;

            try {
                const report = await getSalesReport(startDate, endDate); 
                
                // Update Stats
                document.getElementById('totalSales').textContent = peso(report.totalSalesToday);
                document.getElementById('ordersCount').textContent = report.ordersProcessed;
                document.getElementById('topSeller').textContent = report.topSeller;

                // Fetch detailed orders
                const orders = await getOrders();
                tbody.innerHTML = '';

                if (orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="padding: 20px;">No records found for this period.</td></tr>`;
                    return;
                }

                orders.forEach(o => {
                    const itemsHtml = o.items.map(i =>
                        `• ${i.productName} (x${i.quantity})`
                    ).join('<br>');
                    
                    const totalQty = o.items.reduce((sum, item) => sum + item.quantity, 0);
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${o.id || 'OID-' + Math.floor(Math.random()*9000)}</td>
                        <td style="text-align: left; padding-left: 20px;">${itemsHtml}</td>
                        <td>${totalQty}</td>
                        <td>${peso(o.totalAmount || 0)}</td>
                        <td>${o.orderDate || 'N/A'}</td>
                        <td><button class="action-btn" style="padding: 5px 10px; font-size: 12px;">View Receipt</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Report Load Error:", err);
                showToast("Failed to fetch report data.", "error");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0];
    
    document.getElementById('report-start').value = today;
    document.getElementById('report-end').value = today;

    document.getElementById('report-start').setAttribute('max', today);
    document.getElementById('report-end').setAttribute('max', today);

   
    loadReport(); 
});
    </script>
</body>
</html>
